{% extends "superadmin/dashboard_base.html" %}

{% block page_title %}Assign Permission{% endblock %}
{% block nav_rbac %}active{% endblock %}

{% block dashboard_content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <i class="fa-solid fa-plus me-2"></i> Assign New Permission
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Role <span class="text-danger">*</span></label>
                        <select name="role" class="form-select" required>
                            <option value="">— Select Role —</option>
                            {% for role in roles %}
                            <option value="{{ role.id }}">{{ role.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Select Menu <span class="text-danger">*</span></label>
                        <select name="menu" class="form-select" required>
                            <option value="">— Select Menu —</option>
                            {% for menu in menus %}
                            <option value="{{ menu.id }}">
                                {% if menu.parent %}
                                    &nbsp;&nbsp;└─ 
                                {% endif %}
                                {{ menu.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="can_view" class="form-check-input" id="can_view" checked>
                            <label class="form-check-label fw-semibold" for="can_view">
                                Can View <span class="text-muted">(Menu will appear in sidebar)</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" name="can_write" class="form-check-input" id="can_write">
                            <label class="form-check-label fw-semibold" for="can_write">
                                Can Write <span class="text-muted">(Can add/edit/delete)</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-save"></i> Assign Permission
                        </button>
                        <a href="{% url 'permission_list' %}" class="btn btn-secondary">
                            <i class="fa-solid fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
